<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Store</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* الصفحة الأولى */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.8s;
}

.title{
    font-size:40px;
    font-weight:bold;
}

.sub{
    opacity:0.7;
    margin-top:10px;
}

#enter{
    margin-top:25px;
    background:white;
    color:black;
    border:none;
    padding:12px 30px;
    border-radius:15px;
}

/* الصفحة الثانية */
#main{
    position:absolute;
    top:100%;
    width:100%;
    height:100%;
    transition:0.8s;
    overflow-y:auto;
    padding-top:40px;
}

/* تطبيق */
.app{
    width:90%;
    max-width:400px;
    margin:10px auto;
    background:#111;
    padding:15px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.2s;
}

.app:active{
    transform:scale(0.95);
}

/* أزرار */
button{
    border:none;
    padding:8px 12px;
    border-radius:10px;
}

.upload{background:#444;color:white;}
.download{background:#0A84FF;color:white;}
</style>
</head>

<body>

<!-- شاشة البداية -->
<div id="splash">
    <div class="title">harper hack ios</div>
    <div class="sub">مرحبا بك</div>

    <button id="enter" onclick="enter()">
        دخول
    </button>
</div>

<!-- المتجر -->
<div id="main">

    <div class="app">
        <div>Snapchat</div>
        <div>
            <button class="upload" onclick="selectFile('snap')">رفع</button>
            <button class="download" onclick="download('snap')">تنزيل</button>
        </div>
    </div>

    <div class="app">
        <div>Instagram</div>
        <div>
            <button class="upload" onclick="selectFile('insta')">رفع</button>
            <button class="download" onclick="download('insta')">تنزيل</button>
        </div>
    </div>

</div>

<input type="file" id="file" style="display:none">

<script>

let files = {};
let current = "";

// دخول + حركة
function enter(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();

    document.getElementById("splash").style.top = "-100%";
    document.getElementById("main").style.top = "0";
}

// رفع ملف
function selectFile(app){
    current = app;
    document.getElementById("file").click();
}

// حفظ الملف
document.getElementById("file").onchange = function(e){
    files[current] = e.target.files[0];
    alert("تم رفع الملف");
};

// تنزيل
function download(app){

    let file = files[app];

    if(!file){
        alert("حاليا مافي نسخه له");
        return;
    }

    let url = URL.createObjectURL(file);

    let a = document.createElement("a");
    a.href = url;
    a.download = file.name;
    a.click();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>AI Bot</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  text-align:center;
}
#chat{
  height:70vh;
  overflow:auto;
  padding:10px;
}
input{
  width:70%;
  padding:10px;
}
button{
  padding:10px;
}
.msg{
  margin:10px;
  padding:10px;
  background:#222;
  border-radius:10px;
}
.user{color:#00ff99;}
.ai{color:#ff4444;}
</style>
</head>

<body>

<h2>🤖 بوت ذكي بسيط</h2>

<div id="chat"></div>

<input id="input" placeholder="اكتب شيء...">
<button onclick="send()">إرسال</button>

<script>

function botReply(text){
  text = text.toLowerCase();

  if(text.includes("سلام") || text.includes("هلا")){
    return "هلا فيك 👋 كيف أقدر أساعدك؟";
  }

  if(text.includes("كيفك")){
    return "تمام 👍 وانت كيفك؟";
  }

  if(text.includes("اسمك")){
    return "أنا بوت بسيط 🤖 جاهز أساعدك";
  }

  if(text.includes("ببجي")){
    return "🔥 ببجي لعبة ممتعة! تحبها؟";
  }

  if(text.includes("وداع")){
    return "مع السلامة 👋";
  }

  return "ما فهمت عليك 🤔 لكن حاول تكتب بطريقة أوضح";
}

function send(){
  let input = document.getElementById("input").value;

  document.getElementById("chat").innerHTML +=
  `<div class="msg user">أنت: ${input}</div>`;

  let reply = botReply(input);

  setTimeout(()=>{
    document.getElementById("chat").innerHTML +=
    `<div class="msg ai">AI: ${reply}</div>`;
  },500);
}

</script>

</body>
</html>

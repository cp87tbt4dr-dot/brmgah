<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harper Hack iOS</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* البداية */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s;
}

.title{
    font-size:42px;
    font-weight:bold;
}

.sub{
    font-size:16px;
    opacity:0.7;
    margin-top:10px;
}

#enter{
    margin-top:25px;
    background:white;
    color:black;
    border:none;
    padding:12px 30px;
    border-radius:15px;
    font-size:18px;
}

/* الصفحة الرئيسية */
#main{
    position:absolute;
    top:100%;
    width:100%;
    height:100%;
    transition:1s;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:50px;
}

/* المربع */
.app{
    width:90%;
    max-width:350px;
    background:#111;
    margin:10px;
    padding:15px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.2s;
}

.app:active{
    transform:scale(0.95);
}

/* الأزرار */
button{
    background:#0A84FF;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:12px;
}

.owner{
    background:red;
}
</style>
</head>

<body>

<!-- البداية -->
<div id="splash">
    <div class="title">harper hack ios</div>
    <div class="sub">مرحبا بك</div>

    <button id="enter" onclick="enterSite()">
        دخول
    </button>
</div>

<!-- المحتوى -->
<div id="main">

    <div class="app">
        <div>Snapchat</div>
        <button onclick="download('snapchat.ipa')">تنزيل</button>
    </div>

    <div class="app">
        <div>Instagram</div>
        <button onclick="download('instagram.ipa')">تنزيل</button>
    </div>

    <div class="app">
        <div>رفع ملف</div>
        <button class="owner" onclick="ownerAccess()">رفع</button>
    </div>

</div>

<script>

// دخول
function enterSite(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();

    document.getElementById("splash").style.top = "-100%";
    document.getElementById("main").style.top = "0";
}

// تحميل
function download(file){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();

    window.location.href = file;
}

// كلمة سر المالك
function ownerAccess(){
    let pass = prompt("ادخل كلمة السر:");

    if(pass === "0617i3z"){
        alert("مرحبًا بالمالك ✔️");
    }else{
        alert("كلمة السر خطأ ❌");
    }
}

</script>

</body>
</html>

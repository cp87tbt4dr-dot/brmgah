
   <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harper Hack iOS</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* العنوان العلوي */
#topTitle{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* الصفحة الأولى */
#login{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.8s;
}

.bigTitle{
    font-size:40px;
    font-weight:bold;
}

.sub{
    opacity:0.7;
    margin-top:10px;
}

input{
    margin-top:20px;
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
}

button{
    margin-top:15px;
    background:white;
    color:black;
    border:none;
    padding:10px 25px;
    border-radius:12px;
}

/* الصفحة الثانية */
#main{
    position:absolute;
    top:100%;
    width:100%;
    height:100%;
    transition:0.8s;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:60px;
}

.app{
    width:90%;
    max-width:400px;
    background:#111;
    padding:15px;
    margin:10px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.upload{
    background:#444;
    color:white;
}

.download{
    background:#0A84FF;
    color:white;
}

/* رسالة النسخ */
#copied{
    position:fixed;
    bottom:30px;
    background:#111;
    padding:10px 20px;
    border-radius:12px;
    display:none;
}
</style>
</head>

<body>

<!-- العنوان -->
<div id="topTitle" onclick="copyLink()">
Harper Hack iOS
</div>

<!-- صفحة الدخول -->
<div id="login">

    <div class="bigTitle">harper hack ios</div>
    <div class="sub">مرحبا بك</div>

    <input type="password" id="pass" placeholder="كلمة السر">

    <button onclick="enter()">دخول</button>

</div>

<!-- الصفحة الرئيسية -->
<div id="main">

    <div class="app">
        <div>Snapchat</div>
        <div>
            <button class="upload" onclick="selectFile('snap')">رفع</button>
            <button class="download" onclick="download('snap')">تنزيل</button>
        </div>
    </div>

</div>

<div id="copied">تم النسخ ✅</div>

<input type="file" id="file" style="display:none">

<script>

let files = {};
let current = "";

/* دخول + حفظ كلمة السر */
function enter(){

    let pass = document.getElementById("pass").value;

    if(pass !== "0617i3z"){
        alert("كلمة السر خطأ ❌");
        return;
    }

    localStorage.setItem("auth","ok");

    document.getElementById("login").style.top = "-100%";
    document.getElementById("main").style.top = "0";
}

/* إذا كان داخل مسبقًا */
window.onload = function(){
    if(localStorage.getItem("auth") === "ok"){
        document.getElementById("login").style.top = "-100%";
        document.getElementById("main").style.top = "0";
    }
};

/* رفع ملف */
function selectFile(app){
    current = app;
    document.getElementById("file").click();
}

/* حفظ الملف */
document.getElementById("file").onchange = function(e){
    files[current] = e.target.files[0];
    alert("تم رفع الملف ✔️");
};

/* تنزيل */
function download(app){

    let file = files[app];

    if(!file){
        alert("مافي نسخه منه الحين");
        return;
    }

    let url = URL.createObjectURL(file);

    let a = document.createElement("a");
    a.href = url;
    a.download = file.name;
    a.click();
}

/* نسخ الرابط */
function copyLink(){

    navigator.clipboard.writeText("https://t.me/ipa_Harper");

    let msg = document.getElementById("copied");
    msg.style.display = "block";

    setTimeout(()=>{
        msg.style.display = "none";
    },2000);
}

</script>

</body>
</html>

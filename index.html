<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harper Hack iOS</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* شاشة البداية */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s;
}

.title{
    font-size:42px;
    font-weight:bold;
}

.sub{
    font-size:16px;
    opacity:0.7;
    margin-top:10px;
}

#enter{
    margin-top:25px;
    background:white;
    color:black;
    border:none;
    padding:12px 30px;
    border-radius:15px;
    font-size:18px;
    transition:0.2s;
}

#enter:active{
    transform:scale(0.9);
}

/* الصفحة الرئيسية */
#main{
    position:absolute;
    top:100%;
    width:100%;
    height:100%;
    transition:1s;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:50px;
}

/* مربع التطبيق */
.app{
    width:90%;
    max-width:350px;
    background:#111;
    margin:10px;
    padding:15px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.2s;
}

.app:active{
    transform:scale(0.95);
    background:#222;
}

/* الأزرار */
button{
    background:#0A84FF;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:12px;
    font-size:14px;
    cursor:pointer;
}

.owner{
    background:red;
}

/* حركة ناعمة */
.fadeUp{
    transform:translateY(-100%);
}
</style>
</head>

<body>

<!-- شاشة البداية -->
<div id="splash">
    <div class="title">harper hack ios</div>
    <div class="sub">مرحبا بك</div>

    <button id="enter" onclick="enterSite()">
        دخول
    </button>
</div>

<!-- الصفحة الرئيسية -->
<div id="main">

    <div class="app" onclick="clickEffect(this)">
        <div>Snapchat</div>
        <button onclick="download(event,'snapchat.ipa')">تنزيل</button>
    </div>

    <div class="app" onclick="clickEffect(this)">
        <div>Instagram</div>
        <button onclick="download(event,'instagram.ipa')">تنزيل</button>
    </div>

    <div class="app" onclick="ownerOnly(event)">
        <div>رفع ملف (للمالك)</div>
        <button class="owner">رفع</button>
    </div>

</div>

<script>

// دخول مع حركة
function enterSite(){
    playSound();

    document.getElementById("splash").style.top = "-100%";
    document.getElementById("main").style.top = "0";
}

// صوت
function playSound(){
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();
}

// تحميل ملف
function download(e,file){
    e.stopPropagation();
    playSound();
    window.location.href = file;
}

// زر المالك
function ownerOnly(e){
    e.stopPropagation();
    playSound();
    alert("هذا فقط للمالك");
}

// حركة عند لمس المربع
function clickEffect(el){
    el.style.transform = "scale(0.95)";
    setTimeout(()=>{
        el.style.transform = "scale(1)";
    },150);
}

</script>

</body>
</html>

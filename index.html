<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harper hack ios</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:white;
overflow-x:hidden;
min-height:100vh;
}

/* خلفية */
.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top,#222 0%,#000 60%);
z-index:-1;
}

/* رسالة النسخ */
.toast{
position:fixed;
top:-100px;
left:50%;
transform:translateX(-50%);
background:#111;
border:1px solid #333;
padding:14px 25px;
border-radius:16px;
backdrop-filter:blur(10px);
transition:.4s;
z-index:999;
overflow:hidden;
}

.toast.show{
top:20px;
}

.bar{
position:absolute;
bottom:0;
left:0;
height:3px;
background:white;
width:100%;
animation:timer 5s linear forwards;
}

@keyframes timer{
from{width:100%;}
to{width:0%;}
}

/* الواجهة */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:25px;
text-align:center;
transition:1s;
}

.title{
font-size:42px;
font-weight:bold;
margin-bottom:15px;
letter-spacing:2px;
cursor:pointer;
transition:.3s;
}

.title:active{
transform:scale(.95);
}

.desc{
max-width:340px;
opacity:.75;
line-height:1.8;
font-size:15px;
}

.line{
width:120px;
height:2px;
background:white;
margin:20px 0;
border-radius:50px;
opacity:.8;
}

/* زر الدخول */
.enter-btn{
padding:16px 45px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:bold;
background:white;
color:black;
transition:.25s;
box-shadow:0 0 25px rgba(255,255,255,.15);
}

.enter-btn:active{
transform:scale(.92);
}

.telegram{
margin-top:25px;
opacity:.8;
font-size:14px;
cursor:pointer;
transition:.3s;
}

.telegram:hover{
opacity:1;
}

/* التطبيقات */
.apps{
padding:25px;
display:none;
animation:fade .7s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
border-radius:24px;
padding:22px;
margin-bottom:18px;
backdrop-filter:blur(10px);
transition:.25s;
}

.card:active{
transform:scale(.97);
}

.app-name{
font-size:23px;
font-weight:bold;
margin-bottom:15px;
}

.install-btn{
display:inline-block;
padding:13px 28px;
background:white;
color:black;
border-radius:14px;
text-decoration:none;
font-weight:bold;
transition:.25s;
}

.install-btn:active{
transform:scale(.92);
}

.footer{
text-align:center;
padding:40px 20px;
opacity:.7;
line-height:2;
font-size:14px;
}

.footer-line{
width:140px;
height:2px;
background:white;
margin:20px auto;
border-radius:50px;
opacity:.8;
}

</style>
</head>

<script>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Harper Hack iOS</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

/* الصفحة الأولى */
#splash{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s;
}

.title{
    font-size:40px;
    font-weight:bold;
}

.sub{
    font-size:16px;
    margin-top:10px;
    opacity:0.7;
}

#enterBtn{
    margin-top:30px;
    background:white;
    color:black;
    border:none;
    padding:12px 30px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
    transition:0.2s;
}

#enterBtn:active{
    transform:scale(0.9);
}

/* الصفحة الثانية */
#main{
    position:absolute;
    top:100%;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:1s;
    flex-direction:column;
}

.download{
    background:white;
    color:black;
    border:none;
    padding:12px 30px;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- شاشة البداية -->
<div id="splash">
    <div class="title">harper hack ios</div>
    <div class="sub">مرحبا بك</div>

    <button id="enterBtn" onclick="enterSite()">
        دخول
    </button>
</div>

<!-- الصفحة الرئيسية -->
<div id="main">

    <h2>Snapchat</h2>

    <button class="download" onclick="downloadFile()">
        تنزيل
    </button>

</div>

<script>

function enterSite(){

    // صوت
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();

    // حركة انتقال
    document.getElementById("splash").style.top = "-100%";
    document.getElementById("main").style.top = "0";

}

function downloadFile(){

    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
    audio.play();

    window.location.href = "snapchat.ipa";

}

</script>

</body>
</html>

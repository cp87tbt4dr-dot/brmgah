<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Harper hack ios</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:black;
    color:white;
    overflow:hidden;
}

/* شاشة البداية */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:1s;
}

h1{
    font-size:28px;
}

p{
    opacity:0.7;
}

/* زر الدخول */
button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    margin-top:20px;
}

/* المحتوى */
#app{
    position:relative;
    top:100%;
    transition:1s;
    padding:20px;
}

/* مربع التطبيق */
.box{
    background:#111;
    padding:20px;
    margin-top:20px;
    border-radius:15px;
    transition:0.3s;
}

.box:active{
    transform:scale(0.95);
}

/* رسالة النسخ */
#toast{
    position:fixed;
    top:-50px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    padding:10px 20px;
    border-radius:10px;
    transition:0.5s;
}

#bar{
    height:3px;
    background:blue;
    width:100%;
    position:absolute;
    bottom:0;
    left:0;
}
</style>

</head>
<body>

<!-- رسالة النسخ -->
<div id="toast">
تم النسخ ✅
<div id="bar"></div>
</div>

<!-- شاشة البداية -->
<div id="splash">
    <h1 onclick="copyLink()">Harper hack ios</h1>
    <p>مرحبا بك</p>
    <button onclick="enter()">دخول</button>
    <p style="font-size:12px;opacity:0.5">اللغه العربية 🇸🇦</p>
    <p style="font-size:10px;opacity:0.3">2026</p>
</div>

<!-- المحتوى -->
<div id="app">

    <div class="box">
        <h2>snapchat</h2>
        <button onclick="window.location.href='YOUR_IPA_LINK'">
            تنزيل
        </button>
    </div>

</div>

<script>

function enter(){
    document.getElementById("splash").style.top="-100%";
    document.getElementById("app").style.top="0";
}

/* نسخ الرابط */
function copyLink(){
    navigator.clipboard.writeText("https://t.me/ipa_Harper");

    let toast = document.getElementById("toast");
    let bar = document.getElementById("bar");

    toast.style.top="20px";

    let time = 5;
    let interval = setInterval(()=>{
        bar.style.width = (time*20)+"%";
        time--;
        if(time<0){
            clearInterval(interval);
            toast.style.top="-50px";
        }
    },1000);
}

</script>

</body>
</html>

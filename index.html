<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:white;
}

/* عنوان */
h2{
  margin:10px;
  text-align:center;
}

/* الجهاز */
.device{
  text-align:center;
  color:#aaa;
  font-size:13px;
}

/* الشات */
#chat{
  height:78vh;
  overflow:auto;
  padding:10px;
}

/* الرسائل */
.msg{
  margin:8px 0;
  padding:12px;
  border-radius:12px;
  max-width:85%;
  word-wrap:break-word;
}

.user{
  background:#004d40;
  margin-left:auto;
  text-align:right;
}

.ai{
  background:#1c1c1c;
  margin-right:auto;
}

/* input */
.inputBar{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  padding:10px;
}

input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

button{
  margin-right:8px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#b30000;
  color:white;
}

/* typing */
.dots span{
  animation:blink 1s infinite;
}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}
</style>
</head>

<body>

<h2>🤖 Smart AI Bot</h2>
<div class="device" id="device"></div>

<div id="chat"></div>

<div class="inputBar">
<input id="input" placeholder="اكتب هنا...">
<button onclick="send()">➤</button>
</div>

<script>

document.getElementById("device").innerText =
/Mobi|Android/i.test(navigator.userAgent)
? "📱 جوال"
: "💻 كمبيوتر";

// ذكاء مطوّر (أوسع فهم)
function brain(text){
  text = text.toLowerCase();

  // ترحيب
  if(/(سلام|هلا|مرحبا|اهلا)/.test(text))
    return "هلا 👋 كيف أقدر أساعدك اليوم؟";

  // حب
  if(text.includes("احبك"))
    return "💙 وأنا أقدرك! ليه قلت كذا؟";

  // كيفك
  if(text.includes("كيف"))
    return "تمام 👍 قل لي وش تحتاج";

  // اسم
  if(text.includes("اسم"))
    return "أنا بوت ذكي بسيط 🤖 أتعلم من كلامك";

  // ألعاب
  if(text.includes("ببجي"))
    return "🔥 ببجي؟ وش أكثر شي تحبه فيها؟";

  // سؤال عام
  if(text.includes("ليش") || text.includes("كيف") || text.includes("وش"))
    return "💡 حاول توضّح أكثر بس أنا أحاول أفهمك";

  return "👍 فهمت جزء من كلامك، وضّح أكثر وأنا أرد عليك بشكل أفضل";
}

// typing
function typing(){
  return `<div class="msg ai">🤖 يكتب <span class="dots"><span>.</span><span>.</span><span>.</span></span></div>`;
}

function send(){
  let input = document.getElementById("input");
  let text = input.value;
  if(!text) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<div class="msg user">${text}</div>`;
  chat.innerHTML += typing();

  setTimeout(()=>{
    chat.lastChild.remove();
    chat.innerHTML += `<div class="msg ai">${brain(text)}</div>`;
  },600);

  input.value="";
}
</script>

</body>
</html>

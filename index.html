<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>PUBG Secure UI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0a0a0a,#1a0000);
  color:white;
  text-align:center;
}

.header{
  background:#b30000;
  padding:20px;
  font-size:26px;
  font-weight:bold;
  letter-spacing:2px;
}

.card{
  margin:20px;
  padding:20px;
  background:#1c1c1c;
  border-radius:15px;
  box-shadow:0 0 15px rgba(255,0,0,0.3);
}

button{
  padding:12px 25px;
  margin:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.yes{background:green;color:white;}
.no{background:#444;color:white;}

#loading{
  display:none;
  font-size:20px;
  margin-top:15px;
  color:#ff4444;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}

.box{
  margin-top:20px;
  padding:15px;
  background:#111;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">ببجي 🪖 Secure Panel</div>

<div class="card">
  <h3>هل تسمح للموقع بعرض معلومات الجهاز العامة؟</h3>

  <button class="yes" onclick="allow()">سماح</button>
  <button class="no" onclick="deny()">رفض</button>

  <div id="loading">Loading...</div>

  <div class="box" id="info"></div>
</div>

<script>

function showBasic(){
  return {
    "نوع الجهاز": navigator.userAgent,
    "اللغة": navigator.language,
    "حجم الشاشة": window.screen.width + "x" + window.screen.height,
    "النظام": navigator.platform
  };
}

function allow(){
  document.getElementById("loading").style.display="block";

  let data = showBasic();
  let out="";

  for(let k in data){
    out += `<p>${k}: ${data[k]}</p>`;
  }

  document.getElementById("info").innerHTML = out;

  navigator.geolocation.getCurrentPosition((pos)=>{
    document.getElementById("info").innerHTML +=
    `<p>📍 موقع تقريبي: ${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)}</p>`;

    document.getElementById("loading").style.display="none";
  },()=>{
    document.getElementById("loading").innerText="تم رفض الموقع";
  });
}

function deny(){
  document.getElementById("info").innerHTML =
  "<p style='color:red'>تم الرفض، لا يتم عرض أي بيانات حساسة</p>";
  document.getElementById("loading").style.display="none";
}

</script>

</body>
</html>

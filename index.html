<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harper Store</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* الهيدر */
header{
    text-align:center;
    padding:30px 10px;
    transition:0.6s;
}

header h1{
    font-size:28px;
    cursor:pointer;
}

header p{
    opacity:0.6;
    font-size:14px;
}

/* الشبكة */
.container{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
    padding:15px;
}

/* كرت التطبيق */
.card{
    background:#111;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
    position:relative;
}

.card:active{
    transform:scale(0.97);
}

/* زر التنزيل */
button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    margin-top:10px;
    cursor:pointer;
}

/* حركة ظهور */
.fade{
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* footer بسيط */
footer{
    text-align:center;
    opacity:0.4;
    font-size:12px;
    padding:20px;
}
</style>

</head>

<body>

<header>
    <h1 onclick="copyLink()">Harper Store</h1>
    <p>متجر التطبيقات - مرحباً بك</p>
</header>

<div class="container">

    <!-- Snapchat -->
    <div class="card fade">
        <h2>Snapchat</h2>
        <p>تطبيق سناب شات IPA</p>
        <button onclick="download('https://YOUR_MEDIAFIRE_LINK')">
            تنزيل
        </button>
    </div>

    <!-- Instagram -->
    <div class="card fade">
        <h2>Instagram</h2>
        <p>تطبيق انستقرام IPA</p>
        <button onclick="download('https://YOUR_MEDIAFIRE_LINK')">
            تنزيل
        </button>
    </div>

</div>

<footer>
    © 2026 Harper Store
</footer>

<script>

/* فتح التحميل */
function download(link){
    window.location.href = link;
}

/* نسخ الرابط */
function copyLink(){
    navigator.clipboard.writeText("https://t.me/ipa_Harper");
    alert("تم النسخ ✅");
}

</script>

</body>
</html>

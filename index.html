<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ultra Smart Bot</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0a0a0a,#200000);
  color:white;
  text-align:center;
}

/* جهاز */
.device{
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}

/* شكل الشات */
#chat{
  height:70vh;
  overflow:auto;
  padding:10px;
}

/* الرسائل */
.msg{
  margin:10px;
  padding:12px;
  border-radius:12px;
  background:#1c1c1c;
  text-align:right;
}

.user{color:#00ff99;}
.ai{color:#ff4d4d;}

/* typing dots */
.dots span{
  animation:blink 1s infinite;
}
.dots span:nth-child(2){animation-delay:0.2s;}
.dots span:nth-child(3){animation-delay:0.4s;}

@keyframes blink{
  0%{opacity:0.2;}
  50%{opacity:1;}
  100%{opacity:0.2;}
}

/* input */
input{
  width:65%;
  padding:12px;
  border-radius:10px;
  border:none;
}
button{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#b30000;
  color:white;
}
</style>
</head>

<body>

<h2>🤖 Ultra Smart Bot</h2>

<div id="device" class="device"></div>

<div id="chat"></div>

<input id="input" placeholder="اكتب أي شيء...">
<button onclick="send()">إرسال</button>

<script>

// جهاز المستخدم
function detectDevice(){
  let ua = navigator.userAgent;

  if(/Mobi|Android/i.test(ua)){
    return "📱 أنت تستخدم جوال";
  } else {
    return "💻 أنت تستخدم كمبيوتر";
  }
}

document.getElementById("device").innerText = detectDevice();

// ذكاء أقوى (تحليل كلمات أكثر)
function brain(text){
  text = text.toLowerCase();

  if(text.match(/(سلام|هلا|مرحبا)/))
    return "هلا فيك 👋 نور المكان";

  if(text.includes("كيفك"))
    return "تمام 👍 وانت كيفك؟";

  if(text.includes("احبك"))
    return "💙 وأنا أقدرك! وش خلاك تقول كذا؟";

  if(text.includes("اسمك"))
    return "أنا بوت ذكي مطوّر 🤖 أتعلم من كلامك";

  if(text.includes("ببجي"))
    return "🔥 ببجي؟ وش أفضل سلاح عندك فيها؟";

  if(text.includes("ساعد"))
    return "أكيد 👍 قول لي المشكلة بالتفصيل";

  if(text.includes("وش") || text.includes("ايش"))
    return "وضح أكثر 👍 أنا أحاول أفهمك";

  if(text.includes("وداع") || text.includes("باي"))
    return "في أمان الله 👋";

  return "💡 فهمت جزء من كلامك، حاول توضحه أكثر أو عطيني مثال";
}

// typing animation
function typing(){
  return `<div class="msg ai">
  🤖 يكتب
  <div class="dots">
    <span>.</span><span>.</span><span>.</span>
  </div>
  </div>`;
}

// إرسال
function send(){
  let input = document.getElementById("input").value;
  if(!input) return;

  document.getElementById("chat").innerHTML +=
  `<div class="msg user">أنت: ${input}</div>`;

  document.getElementById("chat").innerHTML += typing();

  setTimeout(()=>{
    let reply = brain(input);

    let chat = document.getElementById("chat");
    chat.lastChild.remove();

    chat.innerHTML +=
    `<div class="msg ai">🤖 ${reply}</div>`;
  },700);

  document.getElementById("input").value="";
}
</script>

</body>
</html>

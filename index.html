<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Store</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    color:white;
}

.app{
    width:90%;
    max-width:400px;
    margin:15px auto;
    background:#111;
    padding:15px;
    border-radius:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
}

.upload{background:#444;color:white;}
.download{background:#0A84FF;color:white;}

.locked{
    opacity:0.4;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="app">
    <div>Snapchat</div>
    <div>
        <button id="uploadBtn" class="upload" onclick="checkAccess('snap')">رفع</button>
        <button class="download" onclick="download('snap')">تنزيل</button>
    </div>
</div>

<input type="file" id="file" style="display:none">

<script>

let files = JSON.parse(localStorage.getItem("files") || "{}");

let wrong = parseInt(localStorage.getItem("wrong") || "0");
let lockTime = parseInt(localStorage.getItem("lock") || "0");

let current = "";

/* رفع */
function checkAccess(app){

    let now = Date.now();

    if(lockTime && now < lockTime){
        alert("تم قفل الزر لمدة ساعة ❌");
        return;
    }

    let pass = prompt("ادخل كلمة السر:");

    if(pass === "0617i3z"){

        wrong = 0;
        localStorage.setItem("wrong","0");

        current = app;
        document.getElementById("file").click();

    }else{

        wrong++;
        localStorage.setItem("wrong",wrong);

        alert("كلمة السر خطأ ❌");

        if(wrong >= 3){
            let lock = Date.now() + (60 * 60 * 1000); // ساعة
            localStorage.setItem("lock",lock);

            document.getElementById("uploadBtn").classList.add("locked");
            alert("تم قفل الزر لمدة ساعة 🚫");
        }
    }
}

/* حفظ ملف دائم */
document.getElementById("file").onchange = function(e){

    let file = e.target.files[0];

    let reader = new FileReader();

    reader.onload = function(){
        files[current] = {
            name:file.name,
            data:reader.result
        };

        localStorage.setItem("files",JSON.stringify(files));

        alert("تم رفع الملف ✔️");
    };

    reader.readAsDataURL(file);
};

/* تحميل */
function download(app){

    let file = files[app];

    if(!file){
        alert("ما فيه نسخه");
        return;
    }

    let a = document.createElement("a");
    a.href = file.data;
    a.download = file.name;
    a.click();
}

/* فك القفل بعد ساعة */
setInterval(()=>{

    let now = Date.now();

    if(lockTime && now > lockTime){
        localStorage.removeItem("lock");
        localStorage.removeItem("wrong");

        document.getElementById("uploadBtn").classList.remove("locked");
    }

},5000);

</script>

</body>
</html>
